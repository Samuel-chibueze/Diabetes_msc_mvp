<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Diabetes Screening System | SmartHealth</title>
    <!-- Google Fonts + modern font stack -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #dce5ec 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === MODERN NAVIGATION BAR === */
        .navbar {
            background: #0f2b3d;
            backdrop-filter: blur(0px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0.9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: #2c9b77;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.35rem;
            letter-spacing: -0.3px;
            background: linear-gradient(120deg, #ffffff, #c7e9f5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-link {
            color: #e2edf2;
            text-decoration: none;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link i {
            font-size: 1rem;
            opacity: 0.8;
        }

        .nav-link:hover {
            background: rgba(44, 155, 119, 0.2);
            color: white;
            transform: translateY(-1px);
        }

        .nav-link:active {
            transform: translateY(1px);
        }

        /* active state (you can add class 'active' dynamically if needed) */
        .nav-link.active {
            background: #2c9b77;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        /* main content wrapper */
        .main-content {
            flex: 1;
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            width: 100%;
        }

        /* card container for pages — each child page will inherit this via block content */
        .page-card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* inner spacing for content (each page can override but this is a nice default) */
        .page-card > :first-child {
            padding: 2rem 2rem 2rem 2rem;
        }

        /* custom utility for full-width no extra padding if needed */
        .no-padding {
            padding: 0 !important;
        }

        /* subtle hr replacement — no ugly <hr> tags */
        .divider-light {
            height: 1px;
            background: linear-gradient(90deg, transparent, #cbd5e1, transparent);
            margin: 1rem 0;
        }

        /* responsivity */
        @media (max-width: 720px) {
            .nav-container {
                flex-direction: column;
                align-items: flex-start;
                padding: 0.8rem 1.2rem;
            }
            .nav-links {
                width: 100%;
                justify-content: space-between;
            }
            .nav-link {
                padding: 0.5rem 0.9rem;
                font-size: 0.85rem;
            }
            .page-card > :first-child {
                padding: 1.5rem;
            }
            .main-content {
                margin: 1.2rem auto;
            }
        }

        /* optional small footer for extra elegance */
        .footer-note {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: #5f7f8f;
            border-top: 1px solid rgba(0,0,0,0.05);
            margin-top: 2rem;
            background: transparent;
        }

        /* Override any legacy hr that might appear in children */
        hr {
            display: none;
        }

        /* smooth interactive elements */
        button, .btn, input, select, textarea {
            font-family: inherit;
        }
    </style>

    <!-- additional block for page-specific head content (CSS, meta) -->
    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- modern navigation with icon integration -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-area">
                <a href="/" class="logo-link">
                    <div class="logo-icon">
                        <i class="fas fa-heartbeat"></i>
                    </div>
                    <div class="logo-text">DiabeScreen</div>
                </a>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i> 
                    <span>Home</span>
                </a>
                <a href="/history/" class="nav-link">
                    <i class="fas fa-clock-rotate-left"></i>
                    <span>History</span>
                </a>
                <a href="/metrics/" class="nav-link">
                    <i class="fas fa-chart-line"></i>
                    <span>Metrics</span>
                </a>
                <a href="/about/" class="nav-link">
                    <i class="fas fa-info-circle"></i>
                    <span>About</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- main dynamic content area -->
    <div class="main-content">
        <div class="page-card">
            {% block content %}
            <!-- child templates will inject content here -->
            {% endblock %}
        </div>
        <!-- subtle footer inside card wrapper but optional -->
        <div class="footer-note">
            <i class="fas fa-microscope"></i> Evidence-based screening | Secure & confidential
        </div>
    </div>

    <!-- small script to highlight current page automatically based on URL -->
    <script>
        (function() {
            // Automatically highlight active nav link based on current pathname
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                // exact match for root and dynamic matching for others
                if (href === currentPath || 
                    (href !== '/' && currentPath.startsWith(href)) ||
                    (href === '/' && currentPath === '/')) {
                    link.classList.add('active');
                } else if (href === '/' && currentPath === '') {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
